# Use vi-style keybindings in copy mode
setw -g mode-keys vi

# Start selection with 'v' (like Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Detect clipboard tool
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "set -g @clipboard 'pbcopy'" \
  "if-shell 'command -v wl-copy >/dev/null 2>&1' \
     'set -g @clipboard \"wl-copy\"' \
     'set -g @clipboard \"xclip -selection clipboard\"'"

# Use it
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard}"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@clipboard}"

# Resize panes with Alt+arrow (no prefix needed), step of 5
bind-key -n M-Left  resize-pane -L 5
bind-key -n M-Right resize-pane -R 5
bind-key -n M-Up    resize-pane -U 5
bind-key -n M-Down  resize-pane -D 5
